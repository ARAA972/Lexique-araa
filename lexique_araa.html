<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexique Stratégique — Groupe ARAA</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#F8F9FA;color:#1F2937;min-height:100vh}
  .top-bar{background:#1E3A5F;color:#fff;padding:1.2rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
  .top-bar h1{font-size:18px;font-weight:600;letter-spacing:0.03em}
  .top-bar p{font-size:12px;opacity:0.7;margin-top:2px}
  .sync-btn{display:flex;align-items:center;gap:6px;font-size:12px;padding:6px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);color:#fff;cursor:pointer;transition:background 0.15s}
  .sync-btn:hover{background:rgba(255,255,255,0.2)}
  .container{max-width:900px;margin:0 auto;padding:1.2rem 1rem}
  .toolbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
  .search-wrap{position:relative;flex:1;min-width:180px}
  .search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:#9CA3AF;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
  #srch{width:100%;padding:9px 12px 9px 34px;border:1px solid #E5E7EB;border-radius:8px;background:#fff;color:#1F2937;font-size:14px;outline:none;transition:border-color 0.15s}
  #srch:focus{border-color:#1E3A5F}
  .filters{display:flex;gap:5px;flex-wrap:wrap}
  .pill{padding:5px 12px;border-radius:20px;font-size:12px;border:1px solid #E5E7EB;background:#fff;color:#6B7280;cursor:pointer;transition:all 0.15s;font-weight:500}
  .pill.active{background:#1E3A5F;color:#fff;border-color:#1E3A5F}
  .pill:hover:not(.active){background:#F3F4F6}
  .alpha{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:1rem}
  .ab{width:28px;height:28px;border-radius:6px;border:1px solid #E5E7EB;background:#fff;color:#9CA3AF;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
  .ab.has{border-color:#CBD5E1;color:#374151}
  .ab.has:hover{background:#F1F5F9;border-color:#94A3B8}
  .ab.off{opacity:0.2;cursor:default;pointer-events:none}
  .count{font-size:12px;color:#9CA3AF;margin-bottom:0.6rem}
  .sec-ltr{font-size:10px;font-weight:700;color:#9CA3AF;letter-spacing:0.12em;padding:1rem 0 0.4rem;border-top:1px solid #F3F4F6;margin-top:4px}
  .sec-ltr:first-of-type{border-top:none;padding-top:0}
  .card{background:#fff;border:1px solid #F3F4F6;border-radius:12px;padding:0.85rem 1.1rem;margin-bottom:6px;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s}
  .card:hover{border-color:#E5E7EB;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
  .card.open{border-color:#CBD5E1;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
  .ct{display:flex;align-items:center;gap:10px}
  .sig{font-size:15px;font-weight:700;color:#1E3A5F;min-width:70px}
  .cm{flex:1;overflow:hidden}
  .cfr{font-size:13px;font-weight:600;color:#1F2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cen{font-size:11px;color:#9CA3AF;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
  .badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap;flex-shrink:0}
  .chev{flex-shrink:0;width:16px;height:16px;stroke:#9CA3AF;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:transform 0.2s}
  .card.open .chev{transform:rotate(180deg)}
  .det{display:none;padding-top:0.8rem;margin-top:0.8rem;border-top:1px solid #F3F4F6}
  .card.open .det{display:block}
  .dg{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;margin-bottom:10px}
  .di label{font-size:10px;color:#9CA3AF;letter-spacing:0.08em;display:block;margin-bottom:2px;font-weight:600}
  .di span{font-size:13px;color:#1F2937}
  .df label{font-size:10px;color:#9CA3AF;letter-spacing:0.08em;display:block;margin-bottom:3px;font-weight:600}
  .df span{font-size:13px;color:#374151;line-height:1.6}
  .empty{text-align:center;padding:3rem 1rem;color:#9CA3AF;font-size:14px}
  .loading{text-align:center;padding:3rem;color:#6B7280;font-size:14px}
  .spinner{display:inline-block;width:20px;height:20px;border:2px solid #E5E7EB;border-top-color:#1E3A5F;border-radius:50%;animation:spin 0.7s linear infinite;margin-bottom:10px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{background:#FEF2F2;border:1px solid #FECACA;border-radius:10px;padding:1rem;color:#991B1B;font-size:13px;margin:1rem 0;text-align:center}
  .legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem}
  .leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#6B7280}
  .leg-dot{width:10px;height:10px;border-radius:50%}
  footer{text-align:center;padding:2rem 1rem;font-size:11px;color:#9CA3AF;border-top:1px solid #F3F4F6;margin-top:1rem}
  @media(max-width:600px){
    .top-bar h1{font-size:15px}
    .sig{min-width:55px;font-size:13px}
    .dg{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <h1>Lexique Stratégique — Groupe ARAA</h1>
    <p>Entreprise · Finance · Stratégie · Droit</p>
  </div>
  <button class="sync-btn" onclick="loadData()">
    <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
    Actualiser
  </button>
</div>

<div class="container">

  <div class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="srch" placeholder="Rechercher un sigle, un mot clé…" autocomplete="off">
    </div>
    <div class="filters" id="fils"></div>
  </div>

  <div class="alpha" id="alph"></div>
  <div class="count" id="cnt"></div>
  <div id="list"><div class="loading"><div class="spinner"></div><br>Chargement depuis Google Sheets…</div></div>

  <footer>Lexique Groupe ARAA · Mise à jour automatique depuis Google Sheets</footer>
</div>

<script>
const SHEET_ID = "1RrQwVoHzVRFzEAtfF3mewAuptSy2yb4YbRqC9hC7Uw0";
const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Lexique`;

const CAT_STYLE = {
  "Finance":                {bg:"#DBEAFE",fg:"#1E3A8A"},
  "Finance / M&A":          {bg:"#EDE9FE",fg:"#4C1D95"},
  "Stratégie":              {bg:"#DCFCE7",fg:"#14532D"},
  "Stratégie / Innovation": {bg:"#D1FAE5",fg:"#064E3B"},
  "Marketing":              {bg:"#FEF9C3",fg:"#713F12"},
  "RH":                     {bg:"#FFE4E6",fg:"#881337"},
  "Juridique":              {bg:"#FED7AA",fg:"#7C2D12"},
  "Juridique / M&A":        {bg:"#FDE8D8",fg:"#7C2D12"},
  "Juridique / Immobilier": {bg:"#FDE8D8",fg:"#7C2D12"},
  "Opérations":             {bg:"#E0F2FE",fg:"#0C4A6E"},
  "Gouvernance":            {bg:"#F3F4F6",fg:"#1F2937"},
};
const DEF = {bg:"#F3F4F6",fg:"#374151"};

let allData = [];
let activeCat = "all";
let searchQ = "";
let openIdx = null;

async function loadData() {
  document.getElementById("list").innerHTML = '<div class="loading"><div class="spinner"></div><br>Chargement…</div>';
  try {
    const r = await fetch(URL);
    const txt = await r.text();
    const json = JSON.parse(txt.substring(47, txt.length - 2));
    const rows = json.table.rows;
    allData = rows.map(row => {
      const c = row.c;
      return {
        sigle:  c[0]?.v || "",
        en:     c[1]?.v || "",
        fr:     c[2]?.v || "",
        detail: c[3]?.v || "",
        cat:    c[4]?.v || "",
        ex:     c[5]?.v || ""
      };
    }).filter(d => d.sigle && d.sigle !== "Sigle");
    allData.sort((a, b) => a.sigle.localeCompare(b.sigle, 'fr'));
    buildFilters();
    render();
  } catch(e) {
    document.getElementById("list").innerHTML = `<div class="err">Impossible de charger les données.<br>Vérifiez que le Sheet est publié sur le web (Fichier → Publier sur le web).<br><small style="opacity:0.7">${e.message}</small></div>`;
  }
}

function buildFilters() {
  const cats = ["all", ...new Set(allData.map(d => d.cat).filter(Boolean))];
  document.getElementById("fils").innerHTML = cats.map(c =>
    `<button class="pill${c === activeCat ? " active" : ""}" onclick="setCat('${c.replace(/'/g,"\\'")}')">
      ${c === "all" ? "Tous" : c}
    </button>`
  ).join("");
}

function setCat(c) { activeCat = c; openIdx = null; buildFilters(); render(); }

function filtered() {
  const q = searchQ.toLowerCase();
  return allData.filter(d => {
    const catOk = activeCat === "all" || d.cat === activeCat;
    const textOk = !q || d.sigle.toLowerCase().includes(q) || d.fr.toLowerCase().includes(q) || d.en.toLowerCase().includes(q) || d.detail.toLowerCase().includes(q);
    return catOk && textOk;
  });
}

function render() {
  const items = filtered();
  document.getElementById("cnt").textContent = items.length + " entrée" + (items.length !== 1 ? "s" : "");

  const letters = [..."ABCDEFGHIJKLMNOPQRSTUVWXYZ"];
  const present = new Set(items.map(d => d.sigle[0]?.toUpperCase()));
  document.getElementById("alph").innerHTML = letters.map(l =>
    `<button class="ab ${present.has(l) ? "has" : "off"}" onclick="scrollToLetter('${l}')">${l}</button>`
  ).join("");

  if (!items.length) {
    document.getElementById("list").innerHTML = '<div class="empty">Aucun résultat pour cette recherche.</div>';
    return;
  }

  let html = "";
  let last = "";
  items.forEach((d, i) => {
    const ltr = d.sigle[0]?.toUpperCase() || "";
    if (ltr !== last) { html += `<div class="sec-ltr" data-ltr="${ltr}">${ltr}</div>`; last = ltr; }
    const st = CAT_STYLE[d.cat] || DEF;
    html += `<div class="card${openIdx === i ? " open" : ""}" onclick="toggle(${i})">
      <div class="ct">
        <span class="sig">${d.sigle}</span>
        <div class="cm">
          <div class="cfr">${d.fr}</div>
          <div class="cen">${d.en}</div>
        </div>
        <span class="badge" style="background:${st.bg};color:${st.fg}">${d.cat}</span>
        <svg class="chev" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="det">
        <div class="dg">
          <div class="di"><label>SIGLE</label><span>${d.sigle}</span></div>
          <div class="di"><label>EXEMPLE</label><span>${d.ex || "—"}</span></div>
        </div>
        <div class="df"><label>SIGNIFICATION DÉTAILLÉE</label><span>${d.detail}</span></div>
      </div>
    </div>`;
  });
  document.getElementById("list").innerHTML = html;
}

function toggle(i) {
  openIdx = openIdx === i ? null : i;
  render();
}

function scrollToLetter(l) {
  const el = document.querySelector(`[data-ltr="${l}"]`);
  if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
}

document.getElementById("srch").addEventListener("input", e => {
  searchQ = e.target.value; openIdx = null; render();
});

loadData();
</script>
</body>
</html>
